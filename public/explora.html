<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #F5F0E8; height: 100vh; display: flex; flex-direction: column; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

  .header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: #FDFAF5; border-bottom: 1px solid #E8E0D4; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #1A1208; }
  .logo span { color: #C4834A; }
  .subtitle { font-size: 0.8rem; color: #8B6B4A; }
  .badge { background: rgba(196,131,74,0.12); color: #C4834A; font-size: 0.75rem; font-weight: 500; padding: 0.25rem 0.75rem; border-radius: 20px; border: 1px solid rgba(196,131,74,0.3); }

  #map { flex: 1; width: 100%; }

  .panel { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #FDFAF5; border: 1px solid #E8E0D4; border-radius: 16px; padding: 1.25rem 1.5rem; min-width: 280px; max-width: 340px; box-shadow: 0 8px 32px rgba(26,18,8,0.15); display: none; z-index: 10; }
  .panel.visible { display: block; }
  .panel-close { position: absolute; top: 0.75rem; right: 0.75rem; background: none; border: none; color: #8B6B4A; cursor: pointer; font-size: 1rem; }
  .panel-emoji { font-size: 1.6rem; margin-bottom: 0.25rem; }
  .panel-name { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: #1A1208; margin-bottom: 0.2rem; }
  .panel-estado { font-size: 0.82rem; color: #8B6B4A; margin-bottom: 0.75rem; }
  .panel-badge { display: inline-block; font-size: 0.72rem; font-weight: 500; color: #C4834A; background: rgba(196,131,74,0.1); padding: 0.2rem 0.75rem; border-radius: 20px; margin-bottom: 1rem; }
  .panel-btn { width: 100%; padding: 0.7rem; background: #C4834A; color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .panel-btn:hover { background: #8B6B4A; }

  .count-badge { position: fixed; top: 80px; right: 1rem; background: #FDFAF5; border: 1px solid #E8E0D4; border-radius: 20px; padding: 0.4rem 0.9rem; font-size: 0.78rem; color: #8B6B4A; z-index: 5; }

function initMap() {
  const map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 23.5, lng: -102.5 },
    zoom: 5,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    styles: [
      { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
    ]
  })

  document.getElementById('counter').textContent = PUEBLOS.length + ' Pueblos Mágicos'

  PUEBLOS.forEach(p => {
    const marker = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng },
      map,
      title: p.nombre,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor: '#C4834A',
        fillOpacity: 1,
        strokeColor: 'white',
        strokeWeight: 2.5,
      }
    })

    marker.addListener('click', () => {
      document.getElementById('panel-name').textContent = p.nombre
      document.getElementById('panel-estado').textContent = p.estado
      document.getElementById('panel').classList.add('visible')
      map.panTo({ lat: p.lat, lng: p.lng })
    })
  })
}

function closePanel() {
  document.getElementById('panel').classList.remove('visible')
}
